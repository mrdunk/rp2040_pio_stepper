# Types of GPIO and spindle VFD.
# Include in your .ini file with: "#INCLUDE ../shared/rp2040_types.ini"
[RP2040_ETH_GPIO_TYPES]
GPIO_TYPE_NOT_SET            = 0
GPIO_TYPE_NATIVE_OUT         = 1
GPIO_TYPE_NATIVE_IN          = 2
GPIO_TYPE_NATIVE_OUT_DEBUG   = 3
GPIO_TYPE_NATIVE_IN_DEBUG    = 4
GPIO_TYPE_I2C_MCP_OUT        = 5
GPIO_TYPE_I2C_MCP_IN         = 6
GPIO_TYPE_I2C_MCP_OUT_PULLUP = 7

[RP2040_ETH_VFD_TYPES]
VFD_TYPE_DISABLED = 0
VFD_TYPE_HUANYANG = 1
VFD_TYPE_FULING   = 2
VFD_TYPE_WEIKEN   = 3
VFD_TYPE_LOOPBACK = 4
